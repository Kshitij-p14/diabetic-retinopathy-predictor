[client]
showErrorDetails = true
maxUploadSize = 200

[server]
port = 8501
headless = true
runOnSave = true
enableCORS = false
enableXsrfProtection = true

[logger]
level = "info"

[theme]
primaryColor = "#667eea"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#262730"
font = "sans serif"
